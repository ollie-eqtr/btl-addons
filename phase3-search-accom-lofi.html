/* ============================================================ RENDER
   Full re-render on every interaction is an accepted lo-fi limitation; do not carry
   this pattern to build. */
var content=document.getElementById('content');
var scrollEl=document.getElementById('scroll');
function normaliseExpand(){
  var exp=state.expand; if(!exp) return;
  var s=stockById(exp.stockId);
  if(!s){ state.expand=null; return; }
  if(isFam()){
    if(exp.boundUnit==null){
      var t=cardTarget(s);
      if(t>=0){
        var g=partyGuests(state.parties[t]);
        /* only re-fit a chosen-but-too-small arrangement; leave an unchosen (null) one alone */
        if(exp.arr!==null&&exp.arr<g){ for(var i=0;i<s.sleeps.length;i++){ if(s.sleeps[i].sleeps>=g){ exp.arr=s.sleeps[i].sleeps; break; } } }
      }
    }
  } else if(exp.boundUnit==null&&exp.arr!==null){
    var rem=state.bbwGuests-placedBBW(-1);
    exp.guests=Math.max(1,Math.min(exp.guests,exp.arr,Math.max(rem,1),MAX_UNIT));
  }
}
function render(){
  var keep=scrollEl.scrollTop;
  normaliseExpand();
  document.getElementById('searchSumm').innerHTML=summText();
  document.getElementById('pageH1').textContent=isFam()?'Make yourself at home':'Your weekend starts here';
  document.getElementById('stepTitle').textContent='Step 1 of '+stepsTotal()+': Accommodation';
  var dots='';
  for(var i=0;i<stepsTotal();i++) dots+='<span class="dotstep'+(i===0?' current':'')+'" role="listitem" aria-label="Step '+(i+1)+(i===0?', current':'')+'"'+(i===0?' aria-current="step"':'')+'></span>';
  document.getElementById('dots').innerHTML=dots;
  /* toggle (and tiles, in tiles view) span full width; the two-column row starts at
     the results, so the group panel top-aligns with them on desktop. On mobile the
     panel moves up to sit directly below the intro (sticky, full bleed).
     Parties mode: full-width sections, no columns and no panel. */
  var mob=state.device==="mobile";
  var view=(state.catUX==="parties"&&(!isFam()||state.parties.length===1))?"tiles":state.catUX;
  /* the hairline under the H1 only earns its keep when nothing else breaks the page:
     single-party bookings have no panel and no sections */
  document.querySelector('.intro').classList.toggle('no-rule',!(isFam()&&state.parties.length===1));
  if(view==="parties"){
    content.innerHTML=whatsIncludedBanner()+resultsHead(false)+partiesUI()+utilityRow();
  } else {
    var panel=groupPanel();
    var results=view==="tiles"
      ? visibleStock().map(function(s){ return accomCard(s); }).join('')
      : groupedUI();
    content.innerHTML=whatsIncludedBanner()+(mob?panel:'')+resultsHead(view==="tiles")+(view==="tiles"?categoryUI():'')+
      '<div class="layout">'+(mob?'':panel)+
      '<div class="results">'+results+utilityRow()+'</div>'+
      '</div>';
  }
  wire();
  recompute();
  scrollEl.scrollTop=keep;
}
function recompute(){
  document.getElementById('totalFig').innerHTML=gbp(grandTotal());
  var note, done=isDone();
  if(done){
    note=isFam()?'Nice one. Next, sort your dining.':'Nice one. Next, dining and extras for your weekender.';
  } else if(isFam()){
    if(state.parties.length>1){
      var n=state.alloc.filter(function(a){ return !a; }).length;
      note='You need to choose accommodation for '+plural(n,'more unit')+' to continue.';
    } else {
      note='Choose your accommodation to continue.';
    }
  } else {
    var m=state.bbwGuests-placedBBW(-1);
    note='You need to place '+m+' more guest'+(m===1?'':'s')+' to continue.';
  }
  document.getElementById('footNote').textContent=note;
  document.getElementById('continueBtn').setAttribute('aria-disabled',done?'false':'true');
}

/* ============================================================ EXPANSION STATE */
function openExpand(s,bound){
  var arr, gf=false, pet=false, pickRoom=false, guests=null;
  if(bound!=null){
    var u=isFam()?state.alloc[bound]:state.bbwUnits[bound];
    arr=u.sleeps; gf=u.gf; pet=!!u.pet; pickRoom=u.pickRoom; guests=isFam()?null:u.guests;
  } else {
    /* fresh card, Family or BBW: no preselected arrangement; picking one is the first action */
    arr=null;
    guests=null;
  }
  state.expand={stockId:s.id,arr:arr,gf:gf,pet:pet,pickRoom:pickRoom,guests:guests,boundUnit:(bound!=null?bound:null)};
}
/* when the expansion is bound to a unit (added state), option changes write through live */
function writeThrough(){
  var exp=state.expand; if(!exp||exp.boundUnit==null) return;
  var u={stockId:exp.stockId,sleeps:exp.arr,pickRoom:exp.pickRoom,gf:exp.gf,pet:exp.pet};
  if(isFam()){
    u.guests=partyGuests(state.parties[exp.boundUnit]);
    state.alloc[exp.boundUnit]=u;
  } else {
    var avail=state.bbwGuests-placedBBW(exp.boundUnit);
    exp.guests=Math.max(1,Math.min(exp.guests,exp.arr,Math.max(avail,1),MAX_UNIT));
    u.guests=exp.guests;
    state.bbwUnits[exp.boundUnit]=u;
  }
}
function bbwPlaceAnnounce(g,name){
  var placed=placedBBW(-1), total=state.bbwGuests, spare=spareBedsBBW();
  announce(plural(g,'guest')+' placed in '+name+'. '+placed+' of '+total+' guests now have a bed.'+(spare>0?' '+plural(spare,'spare bed')+'.':''));
}

/* ============================================================ WIRING */
function q(sel,fn){ content.querySelectorAll(sel).forEach(fn); }
function wire(){
  q('[data-basis]',function(b){ b.addEventListener('click',function(){ state.basis=b.getAttribute('data-basis'); render(); }); });

  /* headings view: collapse/expand sections; opening an inert section is a peek */
  q('[data-sec]',function(b){
    b.addEventListener('click',function(){
      var c=b.getAttribute('data-sec');
      var lock=lockedCategory(), f=catFeasibility(c);
      var inert=(!!lock&&c!==lock)||!f.ok;
      var cur=secIsOpen(c,inert);
      state.secOpen[c]=!cur;
      if(!cur&&inert) announce(!f.ok
        ? nofitText(f)+'. Shown for reference only.'
        : 'Same category only: your booking already has '+lock+'. Shown for reference only.');
      render();
    });
  });
  q('[data-inertexp]',function(b){
    b.addEventListener('click',function(){
      announce(b.getAttribute('data-inertexp')==='lock'
        ? 'Unavailable. All units on one booking must be the same category.'
        : 'Too small for your booking. Choose another category.');
    });
  });
  q('[data-ledger]',function(b){
    b.addEventListener('click',function(){ state.ledgerOpen=!state.ledgerOpen; render(); });
  });

  q('[data-cattile]',function(b){
    b.addEventListener('click',function(){
      var c=b.getAttribute('data-cattile');
      if(b.hasAttribute('data-lockdis')){ announce('Unavailable. All units on one booking must be the same category.'); return; }
      if(b.hasAttribute('data-nofit')){ announce(nofitText(catFeasibility(c))+'. Choose another category.'); return; }
      /* multi-select filter: toggle this category's visibility */
      var nowOff=!state.catOff[c];
      if(nowOff) state.catOff[c]=true; else delete state.catOff[c];
      state.expand=null;
      announce(nowOff?c+' hidden from the list.':c+' shown.');
      render();
    });
  });

  q('[data-expander]',function(b){
    b.addEventListener('click',function(){
      var id=b.getAttribute('data-expander');
      state.flash=null; state.pendingCollapse=null; /* a user-initiated open supersedes any lingering add flash/collapse */
      if(state.expand&&state.expand.stockId===id){ state.expand=null; render(); return; }
      /* re-opening a card that already holds this booking's only unit resumes editing it */
      var bound=null;
      if(isFam()&&state.parties.length===1&&state.alloc[0]&&state.alloc[0].stockId===id) bound=0;
      openExpand(stockById(id),bound);
      render();
      /* mobile: glide down to the sleeping arrangements so the expansion isn't missed (client) */
      if(state.device==="mobile"){
        var ex=document.getElementById('exp-'+id);
        if(ex&&ex.scrollIntoView) ex.scrollIntoView({behavior:'smooth',block:'start'});
      }
    });
  });

  q('[data-arr]',function(b){
    b.addEventListener('click',function(){
      if(b.getAttribute('aria-disabled')==='true'){ announce('Too small for this party.'); return; }
      var bits=b.getAttribute('data-arr').split(':'), s=stockById(bits[0]), sl=+bits[1];
      var exp=state.expand; if(!exp||exp.stockId!==s.id) return;
      /* click the selected arrangement again to unselect it (in-progress choices only;
         an already-added unit switches arrangement rather than clearing to none) */
      if(exp.arr===sl&&exp.boundUnit==null){
        exp.arr=null;
        writeThrough();
        announce('Arrangement cleared.');
        render();
        return;
      }
      exp.arr=sl;
      if(!isFam()&&exp.boundUnit==null){
        var rem=state.bbwGuests-placedBBW(-1);
        exp.guests=Math.max(1,Math.min(sl,Math.max(rem,1),MAX_UNIT));
      }
      writeThrough();
      var a=arrBy(s,sl);
      announce('Sleeps '+sl+', '+a.bed+' selected, '+gbp(a.price)+'.');
      render();
    });
  });
  q('[data-arrclear]',function(b){
    b.addEventListener('click',function(){
      var exp=state.expand; if(!exp||exp.boundUnit!=null) return;
      exp.arr=null; writeThrough(); announce('Arrangement cleared.'); render();
    });
  });
  q('[data-gstep]',function(b){
    b.addEventListener('click',function(){
      if(b.getAttribute('aria-disabled')==='true') return;
      var exp=state.expand; if(!exp) return;
      var rem=state.bbwGuests-placedBBW(exp.boundUnit!=null?exp.boundUnit:-1);
      var maxG=Math.min(exp.arr,rem,MAX_UNIT);
      exp.guests=Math.max(1,Math.min(maxG,exp.guests+(+b.getAttribute('data-gstep'))));
      writeThrough();
      if(exp.boundUnit!=null) bbwPlaceAnnounce(exp.guests,stockById(exp.stockId).name);
      render();
    });
  });
  q('[data-gf]',function(b){
    b.addEventListener('click',function(){
      if(state.expand){ state.expand.gf=!state.expand.gf; writeThrough();
        announce(state.expand.gf?'Ground floor access added, '+gbp(GF_FEE)+'.':'Ground floor access removed.'); render(); }
    });
  });
  q('[data-pet]',function(b){
    b.addEventListener('click',function(){
      if(state.expand){ state.expand.pet=!state.expand.pet; writeThrough();
        announce(state.expand.pet?'Pet friendly added, '+gbp(PET_FEE)+'.':'Pet friendly removed.'); render(); }
    });
  });
  q('[data-rc]',function(b){
    b.addEventListener('click',function(){
      if(state.expand){ state.expand.pickRoom=b.getAttribute('data-rc')==='1'; writeThrough();
        announce(state.expand.pickRoom?'Exact room pick added, '+gbp(ROOM_PICK)+'.':'We’ll choose your room, included.'); render(); }
    });
  });

  /* transient add feedback (multi-unit): success state on the button plus a pulse on
     the panel row, driven by one shared flash so the two always agree */
  function flashAdd(stockId,unit,pick){
    var f={stockId:stockId,unit:unit,pick:pick};
    state.flash=f;
    setTimeout(function(){
      if(state.flash!==f) return;
      state.flash=null;
      /* collapse-on-add variant: the added state has now been shown, so shut the card */
      if(state.pendingCollapse&&state.pendingCollapse.stockId===stockId){ collapseCard(stockId); return; }
      render();
    },1500);
  }
  /* animate the expansion shut, then drop it from state on the next render */
  function collapseCard(id){
    state.pendingCollapse=null;
    var ex=document.getElementById('exp-'+id);
    if(!ex){ state.expand=null; render(); return; }
    ex.style.maxHeight=ex.scrollHeight+'px';
    ex.classList.add('collapsing');
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      ex.style.maxHeight='0px'; ex.style.opacity='0'; ex.style.paddingTop='0'; ex.style.paddingBottom='0';
    }); });
    var done=false, finish=function(){ if(done) return; done=true; state.expand=null; render(); };
    ex.addEventListener('transitionend',finish,{once:true});
    setTimeout(finish,500);
  }
  /* the one commit action, shared by the add row and the options-variant CTAs */
  function commitAdd(){
    var exp=state.expand; if(!exp) return;
    var s=stockById(exp.stockId), pickAtCommit=exp.pickRoom;
    if(isFam()){
      var t=cardTarget(s); if(t<0) return;
      state.alloc[t]={stockId:exp.stockId,sleeps:exp.arr,guests:partyGuests(state.parties[t]),pickRoom:exp.pickRoom,gf:exp.gf,pet:exp.pet};
      allocChanged();
      announce(state.parties.length===1?s.name+' added to your booking.':s.name+' added for Unit '+(t+1)+'.');
      /* single unit keeps the added state; multi-unit resets the button to its default
         so the same card can take the next unit without closing and reopening */
      if(state.parties.length===1) exp.boundUnit=t;
      else {
        flashAdd(s.id,t,pickAtCommit);
        if(state.catUX!=="parties"&&state.addMode==="collapse"){
          /* collapse variant: leave the expansion open so the added state shows, then let
             flashAdd shut the card once the flash clears */
          state.pendingCollapse={stockId:s.id};
        } else if(state.catUX!=="parties"&&cardTarget(s)>=0){
          openExpand(s,null);
        } else {
          /* parties mode moves to a fresh section, so the expansion always closes */
          state.expand=null;
        }
      }
    } else {
      state.bbwUnits.push({stockId:exp.stockId,sleeps:exp.arr,guests:exp.guests,pickRoom:exp.pickRoom,gf:exp.gf,pet:exp.pet});
      allocChanged();
      bbwPlaceAnnounce(exp.guests,s.name);
      flashAdd(s.id,state.bbwUnits.length-1,pickAtCommit);
      /* reset to a fresh add for the next unit; close when everyone has a bed */
      if(state.bbwGuests-placedBBW(-1)>0) openExpand(s,null);
      else state.expand=null;
    }
    render();
    /* parties mode: glide down to the next party's section rather than jumping */
    if(isFam()&&state.catUX==="parties"){
      var nxt=document.querySelector('.party-sec.is-current');
      if(nxt&&nxt.scrollIntoView) nxt.scrollIntoView({behavior:'smooth',block:'start'});
    }
  }
  q('[data-addroom],[data-addunit]',function(b){
    b.addEventListener('click',function(){
      if(b.getAttribute('aria-disabled')==='true') return;
      commitAdd();
    });
  });
  /* options variant: the CTA inside each option sets the room choice, then commits */
  q('[data-addopt]',function(b){
    b.addEventListener('click',function(){
      if(b.getAttribute('aria-disabled')==='true') return;
      if(state.expand) state.expand.pickRoom=b.getAttribute('data-addopt')==='1';
      commitAdd();
    });
  });
  /* add-on variant: the picker is a toggle like ground floor and pet friendly */
  q('[data-rcpick]',function(b){
    b.addEventListener('click',function(){
      if(state.expand){ state.expand.pickRoom=!state.expand.pickRoom; writeThrough();
        announce(state.expand.pickRoom?'Exact room pick added, '+gbp(ROOM_PICK)+'.':'Exact room pick removed.'); render(); }
    });
  });
  q('[data-added]',function(b){
    b.addEventListener('click',function(){ announce('Already added. Use Remove to take it off the booking.'); });
  });

  q('[data-unalloc]',function(b){
    b.addEventListener('click',function(){
      var i=+b.getAttribute('data-unalloc');
      if(isFam()){
        state.alloc[i]=null;
        if(state.expand&&state.expand.boundUnit===i) state.expand.boundUnit=null;
        announce(state.parties.length===1?'Removed from your booking.':'Party '+(i+1)+' choice removed.');
      } else {
        state.bbwUnits.splice(i,1);
        if(state.expand){
          if(state.expand.boundUnit===i) state.expand.boundUnit=null;
          else if(state.expand.boundUnit!=null&&state.expand.boundUnit>i) state.expand.boundUnit--;
        }
        announce('Unit '+(i+1)+' removed. '+placedBBW(-1)+' of '+state.bbwGuests+' guests have a bed.');
      }
      allocChanged();
      render();
    });
  });
  q('[data-edit]',function(b){
    b.addEventListener('click',function(){
      var i=+b.getAttribute('data-edit');
      var u=isFam()?state.alloc[i]:state.bbwUnits[i];
      if(!u) return;
      state.flash=null;
      openExpand(stockById(u.stockId),i);
      announce('Editing Unit '+(i+1)+'.');
      render();
      var el=document.getElementById('exp-'+u.stockId);
      if(el&&el.scrollIntoView) el.scrollIntoView({block:'nearest'});
    });
  });
}

document.getElementById('continueBtn').addEventListener('click',function(e){
  if(this.getAttribute('aria-disabled')==='true'){
    e.preventDefault();
    announce(isFam()?'Choose accommodation for every unit to continue.':'Place every guest to continue.');
  }
});

/* ============================================================ DEV CONTROLS
   Every test variable lives in the left rail. Toolbar changes reset choices and
   re-render; the device toggle only reframes and keeps state so responsive checks
   stay easy. */
function pressGroup(sel,val,attr){
  document.querySelectorAll(sel).forEach(function(b){ b.setAttribute('aria-pressed',b.getAttribute(attr)===String(val)?'true':'false'); });
}
function press(id,on){ document.getElementById(id).setAttribute('aria-pressed',on?'true':'false'); }
function resetChoices(){
  state.alloc=state.parties.map(function(){ return null; });
  state.bbwUnits=[]; state.expand=null; state.catOff={}; state.secOpen={}; state.flash=null;
  state.pendingCollapse=null; state.ledgerOpen=false;
}
function toolbarVis(){
  document.getElementById('tbResort').hidden=!isFam();
  document.getElementById('tbPreset').hidden=!isFam();
  document.getElementById('tbGroup').hidden=isFam();
  /* the collapse-on-add variant only applies to multi-party Family flows */
  document.getElementById('tbAddMode').hidden=!(isFam()&&state.parties.length>1);
  /* Parties view needs pre-defined parties (not BBW) and more than one of them */
  document.getElementById('cxParties').setAttribute('aria-disabled',(isFam()&&state.parties.length>1)?'false':'true');
}
function setPlatform(pf){
  state.platform=pf; state.basis="unit";
  if(pf==="family") state.parties=presetParties(state.presetId);
  if(pf==="bbw"&&state.catUX==="parties"){
    state.catUX="tiles";
    pressGroup('[data-catux]','tiles','data-catux');
    announce('Parties view needs pre-defined parties, so BBW shows tiles.');
  }
  resetChoices();
  press('pfFam',pf==="family"); press('pfBBW',pf==="bbw");
  toolbarVis(); render();
}
function setDevice(d){
  state.device=d;
  document.getElementById('deviceHost').setAttribute('data-device',d);
  press('dvMobile',d==="mobile"); press('dvDesktop',d==="desktop");
  render(); /* panel DOM position differs per device; state is preserved */
}
document.getElementById('pfFam').addEventListener('click',function(){ setPlatform("family"); });
document.getElementById('pfBBW').addEventListener('click',function(){ setPlatform("bbw"); });
document.getElementById('dvMobile').addEventListener('click',function(){ setDevice("mobile"); });
document.getElementById('dvDesktop').addEventListener('click',function(){ setDevice("desktop"); });

/* Category UX is a pure view change: state is deliberately NOT reset, so the two
   layouts can be compared mid-booking */
document.querySelectorAll('[data-catux]').forEach(function(b){
  b.addEventListener('click',function(){
    if(b.getAttribute('aria-disabled')==='true'){
      announce(isFam()?'Parties view needs more than one party.':'Parties view needs pre-defined parties. BBW builds units as you go.');
      return;
    }
    state.catUX=b.getAttribute('data-catux');
    state.expand=null;
    pressGroup('[data-catux]',state.catUX,'data-catux');
    announce(state.catUX==="tiles"?'Category tiles view.':(state.catUX==="headings"?'Category headings view.':'Party sections view.'));
    render();
  });
});
/* Room pick is a pure view change too: state is deliberately NOT reset */
document.querySelectorAll('[data-roompick]').forEach(function(b){
  b.addEventListener('click',function(){
    state.roomPick=b.getAttribute('data-roompick');
    pressGroup('[data-roompick]',state.roomPick,'data-roompick');
    announce(state.roomPick==="addon"?'Room pick as an add-on.':'Room pick as side by side options.');
    render();
  });
});
/* On add: collapse the card after a unit is added, or keep it open. Pure view setting,
   applied on the next add, so no re-render is needed here. */
document.querySelectorAll('[data-addmode]').forEach(function(b){
  b.addEventListener('click',function(){
    state.addMode=b.getAttribute('data-addmode');
    pressGroup('[data-addmode]',state.addMode,'data-addmode');
    announce(state.addMode==="collapse"?'Cards will collapse after adding a unit.':'Cards will stay open after adding a unit.');
  });
});
document.querySelectorAll('[data-resortbtn]').forEach(function(b){
  b.addEventListener('click',function(){
    state.resort=b.getAttribute('data-resortbtn');
    resetChoices();
    pressGroup('[data-resortbtn]',state.resort,'data-resortbtn');
    announce('Resort changed to '+state.resort+'. Accommodation updated and choices cleared.');
    render();
  });
});
document.querySelectorAll('[data-presetbtn]').forEach(function(b){
  b.addEventListener('click',function(){
    state.presetId=b.getAttribute('data-presetbtn');
    state.parties=presetParties(state.presetId);
    resetChoices();
    if(state.catUX==="parties"&&state.parties.length===1){
      state.catUX="tiles";
      pressGroup('[data-catux]','tiles','data-catux');
    }
    pressGroup('[data-presetbtn]',state.presetId,'data-presetbtn');
    toolbarVis();
    announce('Party preset applied: '+PRESETS[state.presetId].label+'. Choices cleared.');
    render();
  });
});
/* Group size keeps units that still fit; reducing below the placed count drops units
   from the end (announced) rather than silently clearing everything. */
document.querySelectorAll('[data-groupbtn]').forEach(function(b){
  b.addEventListener('click',function(){
    var n=+b.getAttribute('data-groupbtn');
    state.bbwGuests=n; state.expand=null;
    var dropped=0;
    while(state.bbwUnits.length&&placedBBW(-1)>n){ state.bbwUnits.pop(); dropped++; }
    pressGroup('[data-groupbtn]',n,'data-groupbtn');
    announce('Group size set to '+n+'.'+(dropped?' '+plural(dropped,'unit')+' removed to fit.':''));
    render();
  });
});

toolbarVis();
render();
</script>
</body>
</html>
